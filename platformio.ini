[env:esp32-s3]
platform = espressif32
board = esp32-s3-n16r8
framework = arduino

extra_scripts =
    pre:tools/embed_web_assets.py

build_src_filter =
    +<*>

monitor_speed = 115200
upload_speed = 921600
upload_port = COM4
monitor_port = COM4

board_build.partitions = partition_16mb_single_ota.csv

build_flags =
    ; Target the ESP32-S3 build in Arduino/ESP-IDF headers and libraries.
    -DCONFIG_IDF_TARGET_ESP32S3
    ; Web UI mode: 0=disabled, 1=minimal recovery UI, 2=full browser UI.
    -DWEB_UI_MODE=1
    ; Enable NOAA alerts support and related UI/routes.
    -DWXV_ENABLE_NOAA_ALERTS=1
    ; Enable lunar calendar screens and data flow.
    -DWXV_ENABLE_LUNAR_CALENDAR=1
    ; Enable lunar luck screens; depends on lunar calendar support.
    -DWXV_ENABLE_LUNAR_LUCK=1
    ; Enable astronomy screen/widgets.
    -DWXV_ENABLE_ASTRONOMY=1
    ; Enable sky brief screen/widgets.
    -DWXV_ENABLE_SKY_BRIEF=1
    ; Enable next-24h prediction screen/graph features.
    -DWXV_ENABLE_NEXT24H_PREDICTION=1
    ; Enable cloud manager / remote cloud integration.
    -DWXV_ENABLE_CLOUD=0

    ; ESP-IDF log verbosity: 0 keeps framework logging quiet.
    -DCORE_DEBUG_LEVEL=0
    ; Project-level serial logs: 0 disables most Serial diagnostics.
    -DWXV_ENABLE_SERIAL_LOGS=0

    ; Disable catch-all IR decoder registration; only specific protocols below are compiled in.
    -D_IR_ENABLE_DEFAULT_=false
    ; Enable NEC IR protocol decoding.
    -DDECODE_NEC
    ; Enable Samsung IR protocol decoding.
    -DDECODE_SAMSUNG
    ; Enable LG IR protocol decoding.
    -DDECODE_LG
    ; Enable Sony IR protocol decoding.
    -DDECODE_SONY
    ; Enable RC5 IR protocol decoding.
    -DDECODE_RC5
    ; Enable RC6 IR protocol decoding.
    -DDECODE_RC6

    ; Use split display layout/features where supported by the UI code.
    -DWXV_DISPLAY_SPLIT=1

    ; Use dynamic mbedTLS buffers to reduce always-reserved internal RAM.
    -DCONFIG_MBEDTLS_DYNAMIC_BUFFER=1
    ; Free peer cert memory after TLS handshake when possible.
    -DCONFIG_MBEDTLS_DYNAMIC_FREE_PEER_CERT=1
    ; Free mbedTLS config structures when they are no longer needed.
    -DCONFIG_MBEDTLS_DYNAMIC_FREE_CONFIG_DATA=1
    ; Free CA certificate memory dynamically when possible.
    -DCONFIG_MBEDTLS_DYNAMIC_FREE_CA_CERT=1
    ; Allow different in/out TLS record sizes to save memory.
    -DCONFIG_MBEDTLS_ASYMMETRIC_CONTENT_LEN=1
    ; TLS inbound record buffer size in bytes.
    -DCONFIG_MBEDTLS_SSL_IN_CONTENT_LEN=4096
    ; TLS outbound record buffer size in bytes.
    -DCONFIG_MBEDTLS_SSL_OUT_CONTENT_LEN=2048

    ; Keep USB CDC serial disabled on boot; use the configured hardware/USB mode instead.
    -DARDUINO_USB_CDC_ON_BOOT=0

    ; Optimize for size.
    -Os
    ; Put functions in individual sections so the linker can discard unused code.
    -ffunction-sections
    ; Put data in individual sections so the linker can discard unused data.
    -fdata-sections
    ; Garbage-collect unused code/data sections at link time.
    -Wl,--gc-sections

lib_deps =
    bblanchon/ArduinoJson
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    https://github.com/me-no-dev/AsyncTCP.git
    adafruit/RTClib
    adafruit/Adafruit GFX Library
    adafruit/Adafruit BusIO
    arduino-libraries/Arduino_JSON@^0.2.0
    mikaeltulldahl/AsyncOta@^1.0.2
    crankyoldgit/IRremoteESP8266@^2.8.6
    sensirion/Sensirion I2C SCD4x@^1.1.0
    adafruit/Adafruit Unified Sensor@^1.1.15
    adafruit/Adafruit BMP280 Library@^2.6.8
    olikraus/U8g2_for_Adafruit_GFX@^1.8.0
    knolleary/PubSubClient@^2.8
    https://github.com/mrcodetastic/ESP32-HUB75-MatrixPanel-DMA.git
	links2004/WebSockets @ ^2.4.1
    https://github.com/earlephilhower/ESP8266Audio.git
	
