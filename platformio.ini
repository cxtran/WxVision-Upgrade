; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32@6.1.0
board = esp32dev
framework = arduino
build_src_filter =
	+<*>
board_upload.flash_size = 16MB
board_build.partitions = partition_16mb_ota.csv
monitor_speed = 115200
upload_speed = 921600
upload_port = COM8
build_flags = 
	; Web UI modes: 0=disabled, 1=minimal, 2=full
	-DWEB_UI_MODE=1
	; NOAA alert feature flag: 1=enabled, 0=disabled
	-DWXV_ENABLE_NOAA_ALERTS=1
	; Lunar feature flags: set to 0 to remove lunar calendar / luck screens
	-DWXV_ENABLE_LUNAR_CALENDAR=1
	-DWXV_ENABLE_LUNAR_LUCK=1
	-DCORE_DEBUG_LEVEL=3
	-D_IR_ENABLE_DEFAULT_=false
	-DDECODE_NEC
	-DDECODE_SAMSUNG
	-DDECODE_LG
	-DDECODE_SONY
	-DDECODE_RC5
	-DDECODE_RC6
	-DWXV_DISPLAY_SPLIT=1
	-DCONFIG_MBEDTLS_DYNAMIC_BUFFER=1
	-DCONFIG_MBEDTLS_DYNAMIC_FREE_PEER_CERT=1
	-DCONFIG_MBEDTLS_DYNAMIC_FREE_CONFIG_DATA=1
	-DCONFIG_MBEDTLS_DYNAMIC_FREE_CA_CERT=1
	-DCONFIG_MBEDTLS_ASYMMETRIC_CONTENT_LEN=1
	-DCONFIG_MBEDTLS_SSL_IN_CONTENT_LEN=4096
	-DCONFIG_MBEDTLS_SSL_OUT_CONTENT_LEN=2048
	-Os
	-ffunction-sections
	-fdata-sections
	-Wl,--gc-sections
lib_deps = 
	bblanchon/ArduinoJson
	https://github.com/me-no-dev/ESPAsyncWebServer.git
	https://github.com/me-no-dev/AsyncTCP.git
	adafruit/RTClib
	adafruit/Adafruit GFX Library
	adafruit/Adafruit BusIO
	ESP32-HUB75-MatrixPanel-I2S-DMA=https://github.com/mrfaptastic/ESP32-HUB75-MatrixPanel-I2S-DMA.git
	arduino-libraries/Arduino_JSON@^0.2.0
	mikaeltulldahl/AsyncOta@^1.0.2
	crankyoldgit/IRremoteESP8266@^2.8.6
	sensirion/Sensirion I2C SCD4x@^1.1.0
	adafruit/Adafruit Unified Sensor@^1.1.15
	adafruit/Adafruit AHTX0@^2.0.5
	adafruit/Adafruit BMP280 Library@^2.6.8
	olikraus/U8g2_for_Adafruit_GFX@^1.8.0
