<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>WxVision</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>
<body>
<header>
  <h1>WxVision</h1>
  <nav>
    <a class="btn-link" href="/" aria-current="page">Home</a>
    <a class="btn-link" href="/config.html">Settings</a>
    <a class="btn-link" href="/status.html">Full Status</a>
    <a class="btn-link" href="/ota">OTA Update</a>
    <a class="btn-link warn" href="/reboot">Reboot</a>
  </nav>
</header>

<main class="container">
  <section class="card">
    <h2>Status</h2>
    <div class="grid status-grid">
      <div><b>WiFi:</b> <span id="st-ssid">--</span></div>
      <div><b>IP:</b> <span id="st-ip">--</span></div>
      <div><b>Temp:</b> <span id="st-temp">--</span></div>
      <div><b>Humidity:</b> <span id="st-humd">--</span></div>
      <div><b>Time:</b> <span id="st-time">--</span></div>
      <div><b>Timezone:</b> <span id="st-tz">--</span></div>
      <div><b>Location:</b> <span id="st-loc">--</span></div>
      <div><b>Updated:</b> <span id="st-updated">--</span></div>
    </div>
    
  </section>

  <section class="card">
    <h2>Remote Control</h2>
    <div class="remote-grid">
      <span class="remote-spacer"></span>
      <button type="button" class="btn remote-btn" data-remote="up">Up</button>
      <span class="remote-spacer"></span>
      <button type="button" class="btn remote-btn" data-remote="left">Left</button>
      <button type="button" class="btn remote-btn primary" data-remote="select">Select</button>
      <button type="button" class="btn remote-btn" data-remote="right">Right</button>
      <span class="remote-spacer"></span>
      <button type="button" class="btn remote-btn" data-remote="down">Down</button>
      <span class="remote-spacer"></span>
    </div>
    <div class="remote-extra">
      <button type="button" class="btn remote-btn" data-remote="menu">Menu</button>
      <button type="button" class="btn remote-btn" data-remote="screen">Toggle Screen</button>
    </div>
    <div class="msg" id="remoteMsg"></div>
  </section>
</main>
</body>
</html>
